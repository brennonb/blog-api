<div id="posts"></div>

<script>
fetch("https://your-render-url/posts")
  .then(res => res.json())
  .then(posts => {
    const container = document.getElementById("posts");

    posts.forEach(post => {
      const div = document.createElement("div");
      div.innerHTML = `
        <h2>${post.title}</h2>
        <p>${post.content}</p>
        ${post.image_path ? `<img src="https://your-render-url${post.image_path}" width="300"/>` : ""}
        <hr/>
      `;
      container.appendChild(div);
    });
  });
</script>
